wants:
  - metadata:
      id: want-opa-travel-target
      name: opa-travel-target
      type: "target"
    spec:
      params:
        max_display: 10
        recipe_path: "yaml/recipes/opa-travel-e2e.yaml"
        goal:
          id: "goal-001"
          trip:
            destination: "Tokyo"
            require_hotel: true
            require_dinner: true
            require_transport: false
          budget_target: 400
        current:
          hotel_reserved: false
          dinner_reserved: false
          transport_booked: false
          hotel_cost: 0
          dinner_cost: 0
        use_llm: false
        policy_dir: "yaml/policies"
        direction_map: >-
          {
            "reserve_hotel": {
              "type": "hotel",
              "params": {"hotel_type": "luxury"},
              "sets": {"hotel_reserved": true},
              "cost_field": "hotel_cost"
            },
            "reserve_dinner": {
              "type": "restaurant",
              "params": {"restaurant_type": "fine dining", "party_size": 2},
              "sets": {"dinner_reserved": true},
              "cost_field": "dinner_cost"
            },
            "reduce_hotel_cost": {
              "type": "hotel",
              "params": {"hotel_type": "budget", "is_rebooking": true},
              "cancels_direction": "reserve_hotel",
              "sets": {"hotel_reduced": true},
              "cost_field": "hotel_cost"
            },
            "reduce_dinner_cost": {
              "type": "restaurant",
              "params": {"restaurant_type": "casual", "party_size": 2, "is_rebooking": true},
              "cancels_direction": "reserve_dinner",
              "sets": {"dinner_reduced": true},
              "cost_field": "dinner_cost"
            }
          }
