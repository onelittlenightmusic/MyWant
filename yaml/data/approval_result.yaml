title: approval_result
description: "Result of an approval workflow sent by Target on completion"
type: object
properties:
  approval_id:
    type: string
    description: "ID of the approval workflow"
  description:
    type: string
    description: "Human-readable result description"
  status:
    type: string
    description: "Approval outcome: approved or failed"
    default: "approved"
  evidence:
    type: object
    description: "Supporting evidence or final itinerary data"
  completed_at:
    type: string
    description: "Timestamp when approval completed (RFC3339)"
