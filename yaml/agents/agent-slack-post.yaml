agents:
  - name: agent_slack_post
    runtime: localGo
    type: do
    description: Composes the morning briefing message from state and posts it to a Slack Incoming Webhook
    version: '1.0'
    capabilities:
      - slack_post_agency
    role: action
    actions:
      - name: post_briefing
        description: Posts the composed briefing message to Slack
        parameters:
          slack_webhook_url:
            type: string
            description: Slack Incoming Webhook URL. Falls back to SLACK_WEBHOOK_URL env var.
            required: false
        state_updates:
          - name: briefing_status
            type: string
            description: Posting status (done, failed)
          - name: last_posted_date
            type: string
            description: Date of last successful post (YYYY-MM-DD)
          - name: last_posted_at
            type: string
            description: Timestamp of last successful post (RFC3339)
          - name: last_message
            type: string
            description: Full text of the last posted briefing
