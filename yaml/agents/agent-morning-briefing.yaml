agents:
  # AgentMorningBriefing - Collects weather + transit info and posts to Slack
  - name: agent_morning_briefing
    runtime: localGo
    type: do
    description: Fetches weather and transit route information, then posts a morning briefing to Slack
    version: '1.0'
    capabilities:
      - morning_briefing_agency
    uses:
      - transit_api_agency
    role: action
    configuration:
      weather_city: Tokyo
      language: ja
    actions:
      - name: run_briefing
        description: Runs the full morning briefing pipeline (weather → transit → Slack)
        parameters:
          slack_webhook_url:
            type: string
            description: Slack Incoming Webhook URL. Falls back to SLACK_WEBHOOK_URL env var.
            required: false
          google_maps_api_key:
            type: string
            description: Google Maps API key. Falls back to GOOGLE_MAPS_API_KEY env var.
            required: false
          openweathermap_api_key:
            type: string
            description: OpenWeatherMap API key. Falls back to OPENWEATHERMAP_API_KEY env var. If absent, uses wttr.in (no key required).
            required: false
          weather_city:
            type: string
            description: City name for weather query
            default: Tokyo
          routes:
            type: array
            description: List of transit routes to include in the briefing
            items:
              name:
                type: string
                description: Human-readable label for this route
              origin:
                type: string
                description: Departure station or address
              destination:
                type: string
                description: Arrival station or address
              arrive_by:
                type: string
                description: Target arrival time HH:MM
              days:
                type: string
                description: Comma-separated weekday codes (mon,tue,wed,thu,fri,sat,sun)
        state_updates:
          - name: briefing_status
            type: string
            description: Status of this run (running, done, failed)
          - name: last_posted_date
            type: string
            description: Date of last successful post (YYYY-MM-DD)
          - name: last_posted_at
            type: string
            description: Timestamp of last successful post (RFC3339)
          - name: last_message
            type: string
            description: Full text of the last composed briefing
          - name: error
            type: string
            description: Error message if the briefing failed
