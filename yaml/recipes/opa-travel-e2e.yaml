recipe:
  metadata:
    name: "OPA Travel E2E"
    description: |
      End-to-end travel planning driven by OPA policy evaluation with budget enforcement.

      The Itinerary want runs the OPA LLM ThinkAgent to evaluate goal vs current
      state and dynamically spawns hotel/restaurant wants based on the action list.
      When each travel want completes, its cost flows back into the current state.
      The OPA policy then checks whether the total cost exceeds the budget target.
      If it does, the policy generates cost-reduction actions (rebook cheaper options).
      The cycle repeats until all bookings are within the budget.

      A companion Budget want tracks total costs and reports remaining budget.
    custom_type: "opa travel e2e"
    category: "travel"
    version: "1.1.0"

  parameters:
    prefix: "opa-travel"
    goal:
      id: "goal-001"
      trip:
        destination: "Tokyo"
        require_hotel: true
        require_dinner: true
        require_transport: false
      budget_target: 400
    current:
      hotel_reserved: false
      dinner_reserved: false
      transport_booked: false
      hotel_cost: 0
      dinner_cost: 0
    policy_dir: "yaml/policies"
    direction_map: >-
      {
        "reserve_hotel": {
          "type": "hotel",
          "params": {"hotel_type": "luxury"},
          "sets": {"hotel_reserved": true},
          "cost_field": "hotel_cost"
        },
        "reserve_dinner": {
          "type": "restaurant",
          "params": {"restaurant_type": "fine dining", "party_size": 2},
          "sets": {"dinner_reserved": true},
          "cost_field": "dinner_cost"
        },
        "reduce_hotel_cost": {
          "type": "hotel",
          "params": {"hotel_type": "budget", "is_rebooking": true},
          "cancels_direction": "reserve_hotel",
          "sets": {"hotel_reduced": true},
          "cost_field": "hotel_cost"
        },
        "reduce_dinner_cost": {
          "type": "restaurant",
          "params": {"restaurant_type": "casual", "party_size": 2, "is_rebooking": true},
          "cancels_direction": "reserve_dinner",
          "sets": {"dinner_reduced": true},
          "cost_field": "dinner_cost"
        }
      }

  state:
    - name: costs
      description: Map of child want names to reported costs
      type: object
      persistent: true
      initialValue: {}
      label: current
    - name: directions
      description: List of suggested planning directions
      type: object
      persistent: true
      initialValue: []
      label: plan
    - name: hotel_cost
      description: Last reported hotel cost
      type: float64
      persistent: true
      initialValue: 0
      label: current
    - name: dinner_cost
      description: Last reported dinner cost
      type: float64
      persistent: true
      initialValue: 0
      label: current
    - name: hotel_reserved
      description: Whether hotel has been reserved
      type: bool
      persistent: true
      initialValue: false
      label: current
    - name: dinner_reserved
      description: Whether dinner has been reserved
      type: bool
      persistent: true
      initialValue: false
      label: current
    - name: hotel_reduced
      description: Whether hotel cost has been reduced
      type: bool
      persistent: true
      initialValue: false
      label: current
    - name: dinner_reduced
      description: Whether dinner cost has been reduced
      type: bool
      persistent: true
      initialValue: false
      label: current
    - name: goal_achieved
      description: Planning completion status
      type: bool
      persistent: true
      initialValue: false
      label: plan
    - name: target_budgets
      description: Computed per-want budget targets
      type: object
      persistent: true
      initialValue: {}
      label: plan
    - name: desired_dispatch
      description: List of wants to be dispatched
      type: object
      persistent: true
      initialValue: []
      label: plan

  wants:
    - metadata:
        type: itinerary
        labels:
          child-role: thinker
      spec:
        params:
          goal: goal
          current: current
          policy_dir: policy_dir
          direction_map: direction_map

    - metadata:
        type: budget
        labels:
          child-role: thinker
      spec:
        params:
          budget: 400
          currency: USD

  example:
    wants:
      - metadata:
          name: "opa-travel-demo"
          type: "opa travel e2e"
          labels:
            recipe: "OPA Travel E2E"
        spec:
          params:
            goal:
              id: "goal-001"
              trip:
                destination: "Tokyo"
                require_hotel: true
                require_dinner: true
                require_transport: false
              budget_target: 400
            current:
              hotel_reserved: false
              dinner_reserved: false
              transport_booked: false
              hotel_cost: 0
              dinner_cost: 0
            use_llm: false
            policy_dir: "yaml/policies"
            direction_map: >-
              {
                "reserve_hotel": {
                  "type": "hotel",
                  "params": {"hotel_type": "luxury"},
                  "sets": {"hotel_reserved": true},
                  "cost_field": "hotel_cost"
                },
                "reserve_dinner": {
                  "type": "restaurant",
                  "params": {"restaurant_type": "fine dining", "party_size": 2},
                  "sets": {"dinner_reserved": true},
                  "cost_field": "dinner_cost"
                },
                "reduce_hotel_cost": {
                  "type": "hotel",
                  "params": {"hotel_type": "budget", "is_rebooking": true},
                  "cancels_direction": "reserve_hotel",
                  "sets": {"hotel_reduced": true},
                  "cost_field": "hotel_cost"
                },
                "reduce_dinner_cost": {
                  "type": "restaurant",
                  "params": {"restaurant_type": "casual", "party_size": 2, "is_rebooking": true},
                  "cancels_direction": "reserve_dinner",
                  "sets": {"dinner_reduced": true},
                  "cost_field": "dinner_cost"
                }
              }
