recipe:
  metadata:
    name: "OTP Pipeline"
    description: |
      OpenTripPlannerを段階的にセットアップするパイプライン。
      OSM/GTFSダウンロード → build-config.json生成 → グラフビルド → サーバー起動
      の順に自動実行する。

      ダウンロード方法は ensure_file_method グローバルパラメータで切り替え可能:
        - "curl"        : Go net/http で直接DL (デフォルト、docker不要)
        - "docker_wget" : docker alpine/wget を使用

      グラフビルドは常に docker_build (docker必須)。
    custom_type: "otp pipeline"
    category: "infrastructure"
    version: "2.0.0"

  parameters:
    prefix: "otp"

  parameter_descriptions:
    prefix: "Wantの名前プレフィックス"

  example:
    wants:
      - metadata:
          name: "my-otp-osm"
          type: ensure_file
        spec:
          params:
            filename: "map.osm.pbf"
            url: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"

  wants:
    # ── Step 1a: OSM data ──────────────────────────────────────────────────
    - metadata:
        name: "{{prefix}}-osm"
        type: ensure_file
        labels:
          category: infrastructure
          otp-pipeline: "{{prefix}}"
          role: otp-prerequisite
          otp-step: osm
      spec:
        params:
          filename: "map.osm.pbf"
          url: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"

    # ── Step 1b: GTFS - Toei Bus ───────────────────────────────────────────
    - metadata:
        name: "{{prefix}}-gtfs-toei-bus"
        type: ensure_file
        labels:
          category: infrastructure
          otp-pipeline: "{{prefix}}"
          role: otp-prerequisite
          otp-step: gtfs
      spec:
        params:
          filename: "toei-bus.zip"
          url: "https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip"

    # ── Step 1c: GTFS - Toei Train ─────────────────────────────────────────
    - metadata:
        name: "{{prefix}}-gtfs-toei-train"
        type: ensure_file
        labels:
          category: infrastructure
          otp-pipeline: "{{prefix}}"
          role: otp-prerequisite
          otp-step: gtfs
      spec:
        params:
          filename: "toei-train.zip"
          url: "https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip"

    # ── Step 1d: build-config.json ─────────────────────────────────────────
    - metadata:
        name: "{{prefix}}-build-config"
        type: otp_build_config
        labels:
          category: infrastructure
          otp-pipeline: "{{prefix}}"
          role: otp-prerequisite
          otp-step: build-config
      spec:
        params:
          gtfs_feeds: '[{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip","filename":"toei-bus.zip"},{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip","filename":"toei-train.zip"}]'

    # ── Step 2: Build OTP graph ────────────────────────────────────────────
    - metadata:
        name: "{{prefix}}-graph"
        type: ensure_file
        labels:
          category: infrastructure
          otp-pipeline: "{{prefix}}"
          role: otp-graph
      spec:
        using:
          - role: otp-prerequisite
        params:
          filename: "graph.obj"
          method: "docker_build"
          docker_image: "docker.io/opentripplanner/opentripplanner:2.6.0"
          docker_container_name: "otp-builder"
          docker_command_args: '["--build", "--save"]'
          docker_env: '{"JAVA_OPTIONS": "-Xmx6G"}'
          prerequisites: '["map.osm.pbf", "build-config.json", "toei-bus.zip", "toei-train.zip"]'

    # ── Step 3: Start OTP server ───────────────────────────────────────────
    - metadata:
        name: "{{prefix}}-server"
        type: otp_server
        labels:
          category: infrastructure
          otp-pipeline: "{{prefix}}"
          role: otp-server
      spec:
        using:
          - role: otp-graph
        params:
          server_memory: "-Xmx4G"
          server_port: "8082"
