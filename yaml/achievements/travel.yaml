# Travel agent achievement seeds.
# Loaded at server startup: achievements start locked; AchievementRules unlock them
# automatically when completion conditions are met by capability_manager.
achievements:
  - agentName: agent_premium
    title: 割引の達人
    description: "ホテル割引capability解禁。discounted hotel (80-150 USD) を選択できる"
    category: hotel
    level: 2
    unlocked: false
    unlocksCapability: hotel_discount
    awardedBy: system

rules:
  - id: rule-hotel-discount
    active: true
    condition:
      agentCapability: hotel_agency
      completedCount: 1
    award:
      title: 割引の達人
      description: "ホテル予約を1回完了し、割引サービスへのアクセスを獲得した"
      level: 2
      category: hotel
      unlocksCapability: hotel_discount
