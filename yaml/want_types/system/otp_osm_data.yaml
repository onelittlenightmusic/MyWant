wantType:
  metadata:
    name: otp_osm_data
    title: OTP OSM Data
    description: |
      Ensures an OSM PBF file exists in data_dir.
      Downloads the file via Docker (alpine/wget) if it is missing.
      IsAchieved returns true as soon as the file is present on disk.
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: docker_phase

  parameters:
    - name: data_dir
      description: Host directory where the OSM PBF file will be stored
      type: string
      defaultGlobalParameter: otp_data_dir
      required: false

    - name: osm_url
      description: URL to download the OSM PBF file
      type: string
      required: false
      default: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"

    - name: osm_filename
      description: Filename to save the OSM PBF as inside data_dir
      type: string
      required: false
      default: "map.osm.pbf"

  state:
    - name: docker_image
      description: Docker image used for the download
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: docker_container_name
      description: Name of the download container
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: docker_volumes
      description: Volume mounts JSON array
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: docker_env
      description: Environment variables JSON object
      type: string
      persistent: false
      label: current
      initialValue: '{}'

    - name: docker_command_args
      description: Container command args JSON array
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: docker_wait_for_exit
      description: Always true for this task container
      type: bool
      persistent: false
      label: current
      initialValue: false

    - name: docker_ports
      description: Port mappings (empty for this want)
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: docker_container_id
      description: Short container ID returned by docker run
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: docker_phase
      description: Container lifecycle phase (starting | done | failed)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: docker_exit_code
      description: Exit code of the download container
      type: int
      persistent: true
      label: current
      initialValue: -1

    - name: docker_error
      description: Error message if the download failed
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: osm_file_path
      description: Full path to the downloaded OSM PBF file
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  requires:
    - docker_management

  agents:
    - name: docker_manager
      role: action
      description: DoAgent that runs the alpine/wget container to download the OSM file

  examples:
    - name: tokyo-osm
      description: Download Tokyo OSM PBF data
      want:
        metadata:
          name: otp-osm-data
          type: otp_osm_data
        spec:
          params:
            data_dir: "/opt/otp-data"
            osm_url: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"
            osm_filename: "map.osm.pbf"
