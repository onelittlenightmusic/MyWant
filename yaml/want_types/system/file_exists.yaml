wantType:
  metadata:
    name: file_exists
    title: File Exists
    description: |
      Ensures a file exists at data_dir/filename.
      If the file is missing, creates it using the configured method:
        - "curl" (default): download with curl
        - "docker_wget":    download via docker alpine/wget
        - "docker_build":  run a one-shot docker container to produce the file

      Prerequisites (filenames relative to data_dir) can be declared.
      The agent waits until all prerequisites exist before proceeding.
    version: '2.0'
    category: system
    pattern: independent

  finalResultField: ensure_file_phase

  achievedWhen:
    field: ensure_file_phase
    operator: "=="
    value: "done"

  parameters:
    - name: filename
      description: Target filename to ensure exists inside data_dir
      type: string
      required: true

    - name: data_dir
      description: Directory where the file will be stored
      type: string
      defaultGlobalParameter: otp_data_dir
      required: false

    - name: method
      description: '"curl" | "docker_wget" | "docker_build"'
      type: string
      defaultGlobalParameter: ensure_file_method
      required: false
      default: "curl"

    - name: url
      description: Download URL (curl and docker_wget methods)
      type: string
      required: false

    - name: prerequisites
      description: JSON array of filenames that must exist first (e.g. '["map.osm.pbf"]')
      type: string
      required: false
      default: "[]"

    - name: docker_image
      description: Docker image (docker_build method)
      type: string
      required: false

    - name: docker_container_name
      description: Container name (docker methods, auto-generated if empty)
      type: string
      required: false

    - name: docker_command_args
      description: Command args JSON array passed to the container
      type: string
      required: false
      default: "[]"

    - name: docker_volumes
      description: |
        Volume mounts JSON array.
        Default for docker_build: ["<data_dir>:/var/opentripplanner"]
        Default for docker_wget:  ["<data_dir>:/data"]
      type: string
      required: false

    - name: docker_env
      description: Environment variables JSON object for docker methods
      type: string
      required: false
      default: "{}"

  state:
    - name: ensure_file_phase
      description: Phase (starting | done | failed)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: ensure_file_path
      description: Resolved absolute path of the target file
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: ensure_file_error
      description: Error message if the operation failed
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: filename
      type: string
      persistent: false
      label: current
      description: Target filename (copied from param)
      initialValue: ''

    - name: data_dir
      type: string
      persistent: false
      label: current
      description: Target directory (copied from param)
      initialValue: ''

    - name: method
      type: string
      persistent: false
      label: current
      description: Download method (copied from param)
      initialValue: 'curl'

    - name: url
      type: string
      persistent: false
      label: current
      description: Download URL (copied from param)
      initialValue: ''

    - name: prerequisites
      type: string
      persistent: false
      label: current
      description: Prerequisites JSON array
      initialValue: '[]'

    - name: docker_image
      type: string
      persistent: false
      label: current
      description: Docker image for docker methods
      initialValue: ''

    - name: docker_container_name
      type: string
      persistent: false
      label: current
      description: Container name for docker methods
      initialValue: ''

    - name: docker_command_args
      type: string
      persistent: false
      label: current
      description: Docker command args JSON array
      initialValue: '[]'

    - name: docker_volumes
      type: string
      persistent: false
      label: current
      description: Docker volume mounts JSON array
      initialValue: '[]'

    - name: docker_env
      type: string
      persistent: false
      label: current
      description: Docker env vars JSON object
      initialValue: '{}'

    - name: achieving_percentage
      type: int
      persistent: true
      label: current
      description: Progress percentage
      initialValue: 0

  onInitialize:
    params:
      filename: filename
      data_dir: data_dir
      method: method
      url: url
      prerequisites: prerequisites
      docker_image: docker_image
      docker_container_name: docker_container_name
      docker_command_args: docker_command_args
      docker_volumes: docker_volumes
      docker_env: docker_env
    executeAgents: true

  inlineAgents:
    - name: ensure_file_agent
      type: do
      runtime: shell
      scriptFile: yaml/scripts/ensure_file.sh
