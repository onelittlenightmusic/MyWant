wantType:
  metadata:
    name: otp_setup
    title: OpenTripPlanner Setup
    description: |
      One-stop coordinator that provisions a full OpenTripPlanner stack in three steps:
        1. download_osm  — downloads OSM PBF data via Docker (curlimages/curl)
        2. build_graph   — builds the OTP routing graph (docker_run, wait_for_exit)
        3. start_server  — starts the OTP server and waits for health check

      Each step is dispatched as a docker_run child Want via direction_map.
      Steps run sequentially, controlled by otp_setup.rego.
      Achieves once the OTP server is up and responding.
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: server_running

  parameters:
    - name: data_dir
      description: Host directory for OSM data, GTFS zips, and the built graph.obj
      type: string
      defaultGlobalParameter: otp_data_dir
      required: false
      example: /opt/otp-data

    - name: osm_url
      description: URL to download the OSM PBF file
      type: string
      required: false
      default: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"

    - name: osm_filename
      description: Filename to save the OSM PBF as inside data_dir
      type: string
      required: false
      default: "map.osm.pbf"

    - name: gtfs_feeds
      description: |
        JSON array of GTFS feeds to download. Each entry: {"url": "...", "filename": "..."}.
        Takes priority over gtfs_url/gtfs_filename. Example:
        '[{"url":"https://example.com/tokyo-metro.zip","filename":"tokyo-metro.zip"},{"url":"https://example.com/mlit.zip","filename":"mlit.zip"}]'
      type: string
      required: false

    - name: gtfs_url
      description: (Legacy) URL to download a single GTFS zip file. Use gtfs_feeds for multiple feeds. If both omitted, walk-only routing.
      type: string
      required: false

    - name: gtfs_filename
      description: (Legacy) Filename to save the single GTFS zip. Used with gtfs_url.
      type: string
      required: false
      default: "gtfs.zip"

    - name: build_memory
      description: JVM heap size for the graph build step (e.g. -Xmx6G)
      type: string
      required: false
      default: "-Xmx6G"

    - name: server_memory
      description: JVM heap size for the OTP server (e.g. -Xmx4G)
      type: string
      required: false
      default: "-Xmx4G"

    - name: server_port
      description: Host port to expose the OTP HTTP API on
      type: string
      required: false
      default: "8080"

    - name: opa_llm_planner_command
      description: Path or name of the opa-llm-planner binary
      type: string
      defaultGlobalParameter: opa_llm_planner_command
      required: false

    - name: policy_dir
      description: Directory containing OPA .rego policy files
      type: string
      defaultGlobalParameter: opa_llm_policy_dir
      required: false

    - name: use_llm
      description: Enable LLM-augmented planning
      type: bool
      defaultGlobalParameter: opa_llm_use_llm
      required: false

    - name: direction_map
      description: JSON map of action name to child Want definition (auto-built by Initialize if not provided)
      type: string
      required: false

  state:
    - name: goal
      description: Target goal state for OPA evaluation (static — OTP server must be running)
      type: object
      persistent: false
      initialValue: {setup_complete: true}
      label: goal

    - name: current
      description: Current snapshot synced each cycle for OPA evaluation
      type: object
      persistent: true
      initialValue: {}
      label: current

    - name: direction_map
      description: JSON string mapping OPA direction names to docker_run child Want configs (built by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: '{}'

    - name: directions
      description: Direction list produced by DispatchThinker on each replan
      type: object
      persistent: true
      initialValue: []
      label: plan

    - name: opa_input_hash
      description: Hash of current used by OPA thinker for change detection
      type: string
      persistent: true
      initialValue: ''
      label: current

    - name: opa_llm_planner_command
      description: Path to the opa-llm-planner binary (promoted from param)
      type: string
      persistent: false
      initialValue: ''
      label: current

    - name: policy_dir
      description: Directory containing OPA .rego policy files (promoted from param)
      type: string
      persistent: false
      initialValue: ''
      label: current

    - name: use_llm
      description: Enable LLM-augmented planning (promoted from param)
      type: bool
      persistent: false
      initialValue: false
      label: current

    - name: osm_downloaded
      description: True once OSM PBF data has been downloaded
      type: bool
      persistent: true
      label: current
      initialValue: false

    - name: gtfs_downloaded
      description: True once GTFS zip data has been downloaded (or no GTFS needed)
      type: bool
      persistent: true
      label: current
      initialValue: false

    - name: graph_built
      description: True once OTP graph.obj has been built successfully
      type: bool
      persistent: true
      label: current
      initialValue: false

    - name: server_running
      description: True once OTP server is up and responding to health checks
      type: bool
      persistent: true
      label: current
      initialValue: false

    - name: achieving_percentage
      description: Overall setup progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  agents:
    - name: opa_llm_thinker
      role: thinker
      description: Evaluates otp_setup.rego to decide the next step

  requires:
    - opa_llm_planning

  examples:
    - name: tokyo-otp
      description: Full OTP setup for Tokyo area transit routing with GTFS (OSM + GTFS parallel download)
      want:
        metadata:
          name: my-otp
          type: otp_setup
        spec:
          params:
            osm_url: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"
            osm_filename: "map.osm.pbf"
            gtfs_url: "https://your-transit-agency.example/gtfs.zip"
            gtfs_filename: "gtfs.zip"
            build_memory: "-Xmx6G"
            server_memory: "-Xmx4G"
            server_port: "8082"
