wantType:
  metadata:
    name: managed_launch
    title: Managed Launch
    description: |
      Manages the lifecycle of either a local process or a Docker Compose stack.

      Two launch types:
        - process (default): starts a command in the background with optional
          health check or log pattern polling. Achieved when process is running.
        - docker_compose: runs `docker compose up -d` against an external
          compose file. Achieved when all services are up (with optional health
          check). Stopped with `docker compose down` on delete.

      Switch between modes with the `launcher` parameter.
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: launch_status

  onInitialize:
    params:
      launch_type: launcher
      process_command: command
      process_args: args
      process_log_file: log_file
      launch_compose_file: compose_file
      server_health_check_url: health_check_url
      server_health_check_interval: health_check_interval
      server_health_check_max_retries: health_check_max_retries
      url_regex: url_regex
      result_field: result_field
      max_retries: max_retries
    plan:
      launch_plan: "start"
    executeAgents: true

  onDelete:
    plan:
      launch_plan: "stop"
    executeAgents: true

  achievedWhen:
    field: launch_status
    operator: "=="
    value: "running"

  parameters:
    - name: launcher
      description: Launch type. "process" starts a local command; "docker_compose" runs a compose file.
      type: string
      required: false
      default: "process"

    - name: command
      description: "(process only) Command to execute (e.g. \"/usr/local/bin/myserver\")"
      type: string
      required: false

    - name: args
      description: "(process only) Arguments as a JSON array (e.g. '[\"--port\", \"8080\"]')"
      type: string
      required: false
      default: "[]"

    - name: log_file
      description: "(process only) Path to write stdout/stderr. Defaults to /tmp/managed-launch-<name>.log"
      type: string
      required: false

    - name: compose_file
      description: "(docker_compose only) Absolute path to a docker-compose.yaml file"
      type: string
      required: false

    - name: health_check_url
      description: HTTP URL to poll for readiness (both modes). Achieved once URL returns 2xx.
      type: string
      required: false

    - name: health_check_interval
      description: Interval between health check attempts (e.g. "5s")
      type: string
      required: false
      default: "500ms"

    - name: health_check_max_retries
      description: Maximum number of health check attempts before failing
      type: int
      required: false
      default: 60

    - name: url_regex
      description: "(process only) Regex with one capture group to extract a URL from the log file"
      type: string
      required: false

    - name: result_field
      description: "(process only) State field to store the URL captured by url_regex (default: server_url)"
      type: string
      required: false
      default: "server_url"

    - name: max_retries
      description: "(process only) Maximum attempts when waiting for url_regex match"
      type: int
      required: false
      default: 30

  state:
    - name: launch_type
      description: Launch type copied from launcher param ("process" or "docker_compose")
      type: string
      persistent: false
      label: current
      initialValue: 'process'

    - name: launch_plan
      description: Lifecycle directive ("start" or "stop"). Written by onInitialize/onDelete hooks.
      type: string
      persistent: false
      label: plan
      initialValue: ''

    - name: launch_status
      description: Current lifecycle status (running | stopped | failed | exited)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: launch_error
      description: Error message if launch failed or exited unexpectedly
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: process_command
      description: Process command (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: process_args
      description: Process args JSON array (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: process_log_file
      description: Log file path for process output
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: process_pid
      description: PID of the running process (process mode)
      type: int
      persistent: true
      label: current
      initialValue: 0

    - name: launch_compose_file
      description: Path to docker-compose.yaml (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: server_health_check_url
      description: Health check URL
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: server_health_check_interval
      description: Health check polling interval
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: server_health_check_max_retries
      description: Maximum health check retries
      type: int
      persistent: false
      label: current
      initialValue: 0

    - name: url_regex
      description: Log pattern regex (process mode)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: result_field
      description: State field to store captured URL (process mode)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: max_retries
      description: Maximum log pattern wait retries (process mode)
      type: int
      persistent: false
      label: current
      initialValue: 0

    - name: server_url
      description: URL captured from log by url_regex (process mode)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  # docker_compose lifecycle is handled by the Ansible inline agent below.
  # process lifecycle is handled by the Go launch_manager agent.
  inlineAgents:
    - name: docker_compose_lifecycle
      type: do
      runtime: ansible
      scriptFile: yaml/scripts/docker_compose_lifecycle.yaml

  requires:
    - launch_management

  agents:
    - name: launch_manager
      role: action
      description: Handles process lifecycle. docker_compose is delegated to Ansible inline agent.

  examples:
    - name: local-process-server
      description: Run a local HTTP server as a process
      want:
        metadata:
          name: my-api-server
          type: managed_launch
        spec:
          params:
            launcher: process
            command: /usr/local/bin/my-api
            args: '["--port", "9000"]'
            health_check_url: "http://localhost:9000/health"
      expectedBehavior: Starts my-api, polls /health, marks as running when 2xx.

    - name: docker-compose-stack
      description: Run a multi-service stack with docker compose
      want:
        metadata:
          name: my-stack
          type: managed_launch
        spec:
          params:
            launcher: docker_compose
            compose_file: /opt/myapp/docker-compose.yaml
            health_check_url: "http://localhost:8080/ready"
      expectedBehavior: Runs docker compose up -d, polls /ready, marks as running when 2xx.
