wantType:
  metadata:
    name: python_thinker
    title: Python Thinker
    description: |
      Executes a Python script as a think agent on each tick.

      The script receives goal, current, and plan state as JSON files via
      environment variables (MYWANT_GOAL_FILE, MYWANT_CURRENT_FILE,
      MYWANT_PLAN_FILE, MYWANT_INPUT_FILE), processes them, and writes
      structured JSON to stdout.

      Expected stdout format:
        {
          "result":          <any>,
          "directions":      ["action1", "action2"],
          "current_updates": {"field": value}
        }

      All output keys are optional. The thinker only re-runs when goal or
      current state has actually changed (MD5 hash comparison), avoiding
      redundant executions.

      Script failures (non-zero exit, invalid JSON output, missing script)
      set the want status to module_error so the problem is immediately visible.
    version: '1.0'
    category: system
    pattern: coordinator

  parameters:
  - name: goal
    description: |
      Initial goal state as a JSON object or YAML map.
      Copied to the "goal" state field on initialization.
    type: object
    default: {}
    required: false
    example: '{"require_hotel": true, "destination": "Tokyo"}'

  - name: current
    description: |
      Initial current state as a JSON object or YAML map.
      Copied to the "current" state field on initialization.
    type: object
    default: {}
    required: false
    example: '{"hotel_reserved": false}'

  - name: python_script_path
    description: |
      Absolute or relative path to the Python script file on disk.
      Mutually exclusive with python_script (inline code).
    type: string
    default: ""
    required: false
    example: "/opt/scripts/my_planner.py"

  - name: python_script
    description: |
      Inline Python source code to execute.
      Written to a temporary file at runtime.
      Mutually exclusive with python_script_path (file path takes precedence if both set).
    type: string
    default: ""
    required: false
    example: |
      import json, os
      inp = json.load(open(os.environ["MYWANT_INPUT_FILE"]))
      print(json.dumps({"directions": ["reserve_hotel"]}))

  - name: python_command
    description: Python interpreter command or absolute path
    type: string
    default: "python3"
    defaultGlobalParameter: python_command
    required: false
    example: "/usr/bin/python3"

  state:
  - name: goal
    description: |
      Target desired state as a JSON object.
      Written by the caller; read by the Python thinker on each tick.
    type: object
    persistent: true
    label: goal
    initialValue: {}
    example: '{"require_hotel": true}'

  - name: current
    description: |
      Current observed state as a JSON object.
      Written by the caller or updated via current_updates output from the script.
    type: object
    persistent: true
    label: current
    initialValue: {}
    example: '{"hotel_reserved": false}'

  - name: result
    description: |
      Structured output returned by the Python script under the "result" key.
      Updated whenever the script runs successfully.
    type: object
    persistent: true
    label: plan
    initialValue: {}

  - name: directions
    description: |
      Action list returned by the Python script under the "directions" key.
      Supports both plain string arrays and OPA-style action objects with a "type" field.
      Updated whenever the script runs successfully.
    type: object
    persistent: true
    label: plan
    initialValue: []

  - name: python_input_hash
    description: |
      MD5 hash of the last Python input (goal + current) used for change detection.
      The thinker skips execution when this hash matches the current input.
    type: string
    persistent: false
    label: current
    initialValue: ""

  - name: python_script_path
    description: Path to Python script file (copied from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: ""

  - name: python_script
    description: Inline Python source code (copied from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: ""

  - name: python_command
    description: Python interpreter command (copied from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: "python3"

  requires:
    - python_thinking
