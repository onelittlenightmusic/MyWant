wantType:
  metadata:
    name: whim_thinker
    title: Whim Thinker
    description: |
      An interactive AI thinker that helps break down a natural-language "whim" memo
      into concrete child wants. It persists indefinitely, accumulating conversation
      history and dispatching sibling wants as the user refines their ideas.

      The thinker is automatically created as a child of a whim-target want.
      Users interact with it via the chat bubble in the whim card.
    version: '1.0'
    category: system
    pattern: independent
    system_type: true

  parameters:
  - name: _dummy
    description: Internal dummy parameter
    type: string
    required: false

  state:
  - name: sessionId
    description: Current interact session ID
    type: string
    persistent: true
    label: internal
    initialValue: ''

  - name: isThinking
    description: Whether the AI is currently processing a message
    type: bool
    persistent: true
    label: current
    initialValue: false

  - name: recommendations
    description: Latest AI-generated recommendations (JSON)
    type: array
    persistent: true
    label: current
    initialValue: []

  - name: conversationHistory
    description: Full conversation history with the AI (JSON array of {role, content, timestamp})
    type: array
    persistent: true
    label: current
    initialValue: []

  - name: error
    description: Error message from last operation
    type: string
    persistent: true
    label: current
    initialValue: ''
