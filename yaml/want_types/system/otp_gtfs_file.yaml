wantType:
  metadata:
    name: otp_gtfs_file
    title: OTP GTFS File
    description: |
      Ensures a single GTFS zip file exists in data_dir.
      One Want instance per GTFS feed. Downloads via Docker (alpine/wget) if missing.
      IsAchieved returns true as soon as the file is present on disk.
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: docker_phase

  parameters:
    - name: data_dir
      description: Host directory where the GTFS zip will be stored
      type: string
      defaultGlobalParameter: otp_data_dir
      required: false

    - name: url
      description: URL to download the GTFS zip file
      type: string
      required: true

    - name: filename
      description: Filename to save the GTFS zip as inside data_dir
      type: string
      required: false
      default: "gtfs.zip"

  state:
    - name: docker_image
      description: Docker image used for the download
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: docker_container_name
      description: Name of the download container (derived from want name)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: docker_volumes
      description: Volume mounts JSON array
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: docker_env
      description: Environment variables JSON object
      type: string
      persistent: false
      label: current
      initialValue: '{}'

    - name: docker_command_args
      description: Container command args JSON array
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: docker_wait_for_exit
      description: Always true for this task container
      type: bool
      persistent: false
      label: current
      initialValue: false

    - name: docker_ports
      description: Port mappings (empty for this want)
      type: string
      persistent: false
      label: current
      initialValue: '[]'

    - name: docker_container_id
      description: Short container ID returned by docker run
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: docker_phase
      description: Container lifecycle phase (starting | done | failed)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: docker_exit_code
      description: Exit code of the download container
      type: int
      persistent: true
      label: current
      initialValue: -1

    - name: docker_error
      description: Error message if the download failed
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: gtfs_file_path
      description: Full path to the downloaded GTFS zip file
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  requires:
    - docker_management

  agents:
    - name: docker_manager
      role: action
      description: DoAgent that runs the alpine/wget container to download the GTFS file

  examples:
    - name: toei-bus-gtfs
      description: Download Toei Bus GTFS data (auth-free ODPT public API)
      want:
        metadata:
          name: otp-gtfs-toei-bus
          type: otp_gtfs_file
        spec:
          params:
            data_dir: "/opt/otp-data"
            url: "https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip"
            filename: "toei-bus.zip"
