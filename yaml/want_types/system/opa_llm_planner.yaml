wantType:
  metadata:
    name: opa_llm_planner
    title: OPA LLM Planner
    description: |
      Plans actions using OPA (Open Policy Agent) policy engine combined with LLM reasoning.

      Accepts a goal state and a current state as JSON objects, then invokes the
      `opa-llm-planner plan` CLI to produce a list of actions that bridge the gap.

      The agent runs on every tick but only calls the CLI when goal or current state
      has actually changed (detected via MD5 hash comparison), avoiding redundant planning.
    version: '1.0'
    category: system
    pattern: coordinator

  parameters:
  - name: goal
    description: |
      Initial goal state as a JSON object or YAML map.
      Copied to the "goal" state field on initialization.
      If the goal state is already set (e.g. resumed from memory), this param is ignored.
    type: object
    default: {}
    required: false
    example: '{"require_hotel": true, "require_dinner": true}'

  - name: current
    description: |
      Initial current state as a JSON object or YAML map.
      Copied to the "current" state field on initialization.
      If the current state is already set (e.g. resumed from memory), this param is ignored.
    type: object
    default: {}
    required: false
    example: '{"hotel_reserved": false, "dinner_reserved": false}'

  - name: opa_llm_planner_command
    description: Path or name of the opa-llm-planner binary
    type: string
    default: "opa-llm-planner"
    defaultGlobalParameter: opa_llm_planner_command
    required: false
    example: "/usr/local/bin/opa-llm-planner"

  - name: policy_dir
    description: |
      Directory containing OPA policy files (.rego).
      When set, passes --policy <dir> to the planner.
      Omit or leave empty to use the planner's built-in policies.
    type: string
    default: ""
    defaultGlobalParameter: opa_llm_policy_dir
    required: false
    example: "/etc/opa/policies"

  - name: use_llm
    description: |
      If true (default), passes --llm and --llm-provider flags to enable LLM-augmented planning.
      Set to false to run pure OPA policy evaluation without LLM assistance.
    type: bool
    default: true
    defaultGlobalParameter: opa_llm_use_llm
    required: false
    example: true

  - name: llm_provider
    description: LLM provider name passed to --llm-provider (e.g. anthropic, openai)
    type: string
    default: "anthropic"
    defaultGlobalParameter: llm_provider
    required: false
    example: "anthropic"

  state:
  - name: goal
    description: |
      Target desired state expressed as a JSON object.
      Written by the caller; read by the OPA LLM Planner on each tick.
    type: object
    persistent: true
    label: goal
    initialValue: {}
    example: '{"service": "deployed", "replicas": 3}'

  - name: current
    description: |
      Current observed state expressed as a JSON object.
      Written by the caller (e.g. a monitoring want); read by the OPA LLM Planner on each tick.
    type: object
    persistent: true
    label: current
    initialValue: {}
    example: '{"service": "stopped", "replicas": 0}'

  - name: directions
    description: |
      Planned directions produced by opa-llm-planner, stored as an array of direction objects.
      Updated whenever goal or current state changes.
    type: object
    persistent: true
    label: plan
    initialValue: []
    example: '[{"type": "start_service", "target": "my-app"}]'

  - name: opa_input_hash
    description: |
      MD5 hash of the last OPA input (goal + current) used for change detection.
      The thinker skips planning when this hash matches the current input.
    type: string
    persistent: false
    label: current
    initialValue: ""

  - name: opa_llm_planner_command
    description: Path or name of the opa-llm-planner binary (copied from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: "opa-llm-planner"

  - name: policy_dir
    description: Directory containing OPA policy files (copied from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: ""

  - name: use_llm
    description: Whether to use LLM-augmented planning (copied from param by Initialize)
    type: bool
    persistent: false
    label: current
    initialValue: true

  - name: llm_provider
    description: LLM provider name (copied from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: "anthropic"

  requires:
    - opa_llm_planning
