wantType:
  metadata:
    name: otp_build_config
    title: OTP Build Config
    description: |
      Ensures build-config.json exists in data_dir with the correct transitFeeds entries
      for all configured GTFS files. Written directly from Go — no Docker needed.
      If no GTFS feeds are configured, IsAchieved returns true immediately.
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: config_written

  parameters:
    - name: data_dir
      description: Host directory where build-config.json will be written
      type: string
      defaultGlobalParameter: otp_data_dir
      required: false

    - name: gtfs_feeds
      description: |
        JSON array of GTFS feeds. Each entry: {"url": "...", "filename": "..."}.
        The filenames are used to populate transitFeeds in build-config.json.
        Takes priority over gtfs_url/gtfs_filename.
      type: string
      required: false

    - name: gtfs_url
      description: (Legacy) URL of a single GTFS feed. Used only if gtfs_feeds is not set.
      type: string
      required: false

    - name: gtfs_filename
      description: (Legacy) Filename of the single GTFS zip. Used with gtfs_url.
      type: string
      required: false
      default: "gtfs.zip"

  state:
    - name: config_written
      description: True once build-config.json has been written (or no GTFS needed)
      type: bool
      persistent: true
      label: current
      initialValue: false

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  examples:
    - name: toei-build-config
      description: Write build-config.json for Toei Bus + Toei Train GTFS feeds
      want:
        metadata:
          name: otp-build-config
          type: otp_build_config
        spec:
          params:
            data_dir: "/opt/otp-data"
            gtfs_feeds: '[{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip","filename":"toei-bus.zip"},{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip","filename":"toei-train.zip"}]'
