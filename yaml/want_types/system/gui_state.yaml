wantType:
  metadata:
    name: gui_state
    title: GUI Display State
    description: >
      Tracks the current web dashboard display state (active sidebar want,
      status filter, search query). Automatically created on server startup;
      state resets on restart. Used by `mywant gui show` to navigate the
      dashboard remotely.
    version: '1.0'
    category: system
    pattern: independent
    labels:
      system-internal: "true"

  parameters: []

  state:
    - name: source
      description: Who last updated the state ("cli" or "frontend")
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: dashboard_status_filter
      description: Active status filter on the dashboard (e.g. "reaching", "stopped", "")
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: dashboard_search_query
      description: Active search query on the dashboard
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: sidebar_open
      description: Whether the want details sidebar is open
      type: bool
      label: current
      persistent: false
      initialValue: false

    - name: sidebar_want_id
      description: ID of the want currently shown in the sidebar
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: sidebar_active_tab
      description: Active tab in the sidebar (settings|results|logs|agents|versions|chat)
      type: string
      label: current
      persistent: false
      initialValue: ""
