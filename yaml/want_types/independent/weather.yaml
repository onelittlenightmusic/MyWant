wantType:
  metadata:
    name: weather
    title: Weather
    description: Fetches weather information for a city and propagates result to parent want.
    version: '1.0'
    category: utility
    pattern: independent
  finalResultField: weather_text

  parameters:
    - name: weather_city
      description: City name for weather query
      type: string
      default: Tokyo
      required: false

    - name: openweathermap_api_key
      description: OpenWeatherMap API key. Falls back to OPENWEATHERMAP_API_KEY env var. If absent, uses wttr.in.
      type: string
      required: false

  state:
    - name: weather_city
      description: City name for weather query (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: openweathermap_api_key
      description: OpenWeatherMap API key (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: weather_text
      description: Current weather summary text
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: weather_date
      description: Date when weather was last fetched (YYYY-MM-DD)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  agents:
    - name: agent_weather
      role: action
      description: Fetches weather from wttr.in or OpenWeatherMap

  requires:
    - weather_agency
