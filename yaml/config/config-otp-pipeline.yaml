wants:
  # ── Step 1a: OSM data ─────────────────────────────────────────────────────
  - metadata:
      name: otp-osm
      type: otp_osm_data
      labels:
        role: otp-prerequisite
        otp-step: osm
    spec:
      params:
        # data_dir はグローバルパラメータ otp_data_dir から自動取得 (~/.mywant/parameters.yaml)
        # 必要に応じて明示的に上書き:
        # data_dir: /opt/otp-data
        osm_url: "https://download.bbbike.org/osm/bbbike/Tokyo/Tokyo.osm.pbf"
        osm_filename: "map.osm.pbf"

  # ── Step 1b: GTFS - Toei Bus (都営バス) ─────────────────────────────────
  - metadata:
      name: otp-gtfs-toei-bus
      type: otp_gtfs_file
      labels:
        role: otp-prerequisite
        otp-step: gtfs
    spec:
      params:
        url: "https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip"
        filename: "toei-bus.zip"

  # ── Step 1c: GTFS - Toei Train (都営地下鉄) ─────────────────────────────
  - metadata:
      name: otp-gtfs-toei-train
      type: otp_gtfs_file
      labels:
        role: otp-prerequisite
        otp-step: gtfs
    spec:
      params:
        url: "https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip"
        filename: "toei-train.zip"

  # ── Step 1d: build-config.json ────────────────────────────────────────────
  - metadata:
      name: otp-build-config
      type: otp_build_config
      labels:
        role: otp-prerequisite
        otp-step: build-config
    spec:
      params:
        gtfs_feeds: '[{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip","filename":"toei-bus.zip"},{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip","filename":"toei-train.zip"}]'

  # ── Step 2: Build OTP routing graph ──────────────────────────────────────
  # Waits for all otp-prerequisite wants (osm, gtfs, build-config) to achieve.
  # Guards in Initialize() also check file existence before building.
  - metadata:
      name: otp-graph
      type: otp_graph
      labels:
        role: otp-graph
    spec:
      using:
        - role: otp-prerequisite
      params:
        osm_filename: "map.osm.pbf"
        build_memory: "-Xmx6G"
        gtfs_feeds: '[{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/ToeiBus-GTFS.zip","filename":"toei-bus.zip"},{"url":"https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip","filename":"toei-train.zip"}]'

  # ── Step 3: Start OTP server ──────────────────────────────────────────────
  # Waits for graph to be built before starting.
  - metadata:
      name: otp-server
      type: otp_server
      labels:
        role: otp-server
    spec:
      using:
        - role: otp-graph
      params:
        server_memory: "-Xmx4G"
        server_port: "8082"
