wants:
  - name: claude_code_watcher
    type: claude_code_thread
    spec:
      params:
        session_id: "YOUR_SESSION_ID_HERE"
        watch_pattern: "LGTM|approved|done|completed"
        trigger_on: "pattern"
        auto_request: |
          前回の確認内容を踏まえ、次のステップに進んでください。
          実装計画を具体化してください。
        max_requests: 3
        timeout_seconds: 300
