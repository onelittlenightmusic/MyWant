      name: ngrok-explicit-log
      type: managed_launch
    spec:
      params:
        launcher: process
        command: ngrok
        args: '["http", "8080"]'
        log_file: "/Users/hiroyukiosaki/ngrok-test.log"
        url_regex: 'Forwarding\s+(https://[^\s]+)'
        result_field: tunnel_url
