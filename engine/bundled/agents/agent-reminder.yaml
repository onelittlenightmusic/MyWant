agents:
  - name: reminder_queue_manager
    runtime: localGo
    type: do
    description: Manages the creation and cleanup of reaction queues for scheduled reminders.
    version: '1.0'
    capabilities:
      - reminder_queue_management
    role: action

  - name: user_reaction_monitor
    runtime: localGo
    type: monitor
    description: Polls the reaction queue API and writes the user's approve/reject response into want state.
    version: '1.0'
    capabilities:
      - reminder_monitoring
    role: monitor
