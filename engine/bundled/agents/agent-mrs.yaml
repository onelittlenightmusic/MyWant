agents:
  - name: monitor_mrs_agent
    runtime: localGo
    type: monitor
    description: Executes a Machine-Readable Skill (MRS) script periodically and writes raw JSON output to mrs_raw_output state. Prevents concurrent execution and stops after successful run.
    version: '1.0'
    capabilities:
      - monitor_mrs_agent
    role: monitor
    monitoring:
      target: skill_name
      check_interval: 5 seconds
    actions:
      - name: execute_mrs_skill
        description: Runs the MRS Python script (python3) resolved from skill_path or {skill_base_dir}/{skill_name}/main.py and captures JSON output.
        state_inputs:
          - name: skill_path
            type: string
            description: Absolute path to the skill script. Takes priority over skill_name + skill_base_dir.
          - name: skill_name
            type: string
            description: Skill directory name under skill_base_dir (used when skill_path is not set).
          - name: skill_base_dir
            type: string
            description: Base directory for skills. Defaults to ~/.claude/skills.
          - name: skill_timeout_seconds
            type: integer
            description: Execution timeout in seconds. Defaults to 120.
        state_updates:
          - name: mrs_raw_output
            type: object
            description: Parsed JSON output returned by the skill script.

  - name: do_mrs_agent
    runtime: localGo
    type: do
    description: Executes a Machine-Readable Skill (MRS) script once with optional CLI arguments and writes raw JSON output to mrs_raw_output state.
    version: '1.0'
    capabilities:
      - do_mrs_agent
    role: action
    actions:
      - name: execute_mrs_skill
        description: Runs the MRS Python script with optional positional args built from skill_json_arg or skill_args_keys, captures JSON output.
        state_inputs:
          - name: skill_path
            type: string
            description: Absolute path to the skill script. Takes priority over skill_name + skill_base_dir.
          - name: skill_name
            type: string
            description: Skill directory name under skill_base_dir (used when skill_path is not set).
          - name: skill_base_dir
            type: string
            description: Base directory for skills. Defaults to ~/.claude/skills.
          - name: skill_json_arg
            type: string
            description: Pre-built JSON string passed as a single CLI argument (highest priority for args).
          - name: skill_args_keys
            type: string
            description: Space-separated list of current state field names whose values become positional CLI arguments.
          - name: skill_timeout_seconds
            type: integer
            description: Execution timeout in seconds. Defaults to 120.
        state_updates:
          - name: mrs_raw_output
            type: object
            description: Parsed JSON output returned by the skill script.
