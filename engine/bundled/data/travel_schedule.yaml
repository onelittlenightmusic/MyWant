title: travel_schedule
description: "A travel booking schedule result"
type: object
properties:
  destination:
    type: string
    description: "Travel destination"
  departure:
    type: string
    description: "Departure location"
  check_in:
    type: string
    description: "Check-in date (ISO 8601)"
  check_out:
    type: string
    description: "Check-out date (ISO 8601)"
  status:
    type: string
    description: "Booking status"
    default: "pending"
  details:
    type: object
    description: "Additional booking details"
