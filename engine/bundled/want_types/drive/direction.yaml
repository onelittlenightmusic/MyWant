wantType:
  metadata:
    name: direction
    title: Direction (Heading)
    description: A grid-vector heading control that targets one or more characters (0=east/+X, increases clockwise toward +Y). The vector's magnitude (1-5 grid cells) acts as a weight when multiple direction wants target the same character — the drive engine resolves the effective heading as the vector sum of every targeting want's (dx, dy).
    version: '2.0'
    category: drive
    pattern: independent
    labels:
      user-control: "true"
      type-icon: "Compass"
      category-icon: "Car"
      category-bg-light: "linear-gradient(160deg, #a7f3d0 0%, #93c5fd 100%)"
      category-bg-dark: "linear-gradient(160deg, #065f46 0%, #1e3a8a 100%)"
  parameters:
  - name: characters
    description: Character IDs this want targets
    type: array
    subType: character_ids
    required: false
  - name: dx
    description: Initial grid-cell X offset of the heading vector (0=east/+X); magnitude capped at 5
    type: float64
    default: 1
    required: false
  - name: dy
    description: Initial grid-cell Y offset of the heading vector (0=south/+Y); magnitude capped at 5
    type: float64
    default: 0
    required: false
  state:
  - name: dx
    description: Current grid-cell X offset of the heading vector
    type: float64
    label: current
    persistent: true
    exposable: true
    initialValue: 1
  - name: dy
    description: Current grid-cell Y offset of the heading vector
    type: float64
    label: current
    persistent: true
    exposable: true
    initialValue: 0
  - name: characters
    description: Character IDs this want targets
    type: array
    label: current
    persistent: true
  - name: webhook_payload
    description: Payload received via POST /api/v1/webhooks/{id}; consumed by Progress()
    type: object
    label: current
  - name: webhook_received_at
    description: Timestamp of the last received webhook
    type: string
    label: current
  examples:
  - title: Head east with extra weight
    description: Sets a character's heading vector to (4, 0) — due east, magnitude 4
    want:
      metadata:
        name: cart-direction
        type: direction
      spec:
        params:
          dx: 4
          dy: 0
