wantType:
  metadata:
    name: direction
    title: Direction (Heading)
    description: A 0-360° heading control that targets one or more characters (0=east/+X, increases clockwise toward +Y). When multiple direction wants target the same character, the drive engine resolves the effective heading as the vector sum of each targeting want's unit heading vector.
    version: '1.0'
    category: drive
    pattern: independent
    labels:
      user-control: "true"
      type-icon: "Compass"
      category-icon: "Car"
      category-bg-light: "linear-gradient(160deg, #a7f3d0 0%, #93c5fd 100%)"
      category-bg-dark: "linear-gradient(160deg, #065f46 0%, #1e3a8a 100%)"
  parameters:
  - name: characters
    description: Character IDs this want targets
    type: array
    subType: character_ids
    required: false
  - name: default
    description: Initial heading in degrees (0=east/+X, increases clockwise toward +Y)
    type: float64
    default: 0
    required: false
  state:
  - name: degrees
    description: Current heading in degrees (0=east/+X, increases clockwise toward +Y)
    type: float64
    label: current
    persistent: true
    exposable: true
    initialValue: 0
  - name: characters
    description: Character IDs this want targets
    type: array
    label: current
    persistent: true
  - name: webhook_payload
    description: Payload received via POST /api/v1/webhooks/{id}; consumed by Progress()
    type: object
    label: current
  - name: webhook_received_at
    description: Timestamp of the last received webhook
    type: string
    label: current
  examples:
  - title: Head east
    description: Sets a character's heading to due east
    want:
      metadata:
        name: cart-direction
        type: direction
      spec:
        params:
          default: 90
