wantType:
  metadata:
    name: echo_monitor
    title: Echo Monitor
    description: |
      A sample YAML-only want type demonstrating inlineAgents and achievedWhen.
      A shell do-agent echoes the current count, and a Python monitor increments it.
      Achieved when count reaches the configured limit.
    version: "1.0"
    category: system
    pattern: independent
    system_type: true

  parameters:
    - name: limit
      description: Target count to reach before the want is achieved
      type: int
      default: 5
      required: false

  state:
    - name: count
      description: Current echo count
      type: int
      label: current
      persistent: true
      initialValue: 0
    - name: limit
      description: Copied from parameter
      type: int
      label: current
      persistent: false
      initialValue: 5

  achievedWhen:
    field: count
    operator: ">="
    value: 5

  inlineAgents:
    - name: echo_do
      type: do
      runtime: shell
      script: |
        #!/bin/sh
        COUNT=$(jq -r '.count // 0' "$MYWANT_CURRENT_FILE")
        LIMIT=$(jq -r '.limit // 5' "$MYWANT_CURRENT_FILE")
        NEW_COUNT=$((COUNT + 1))
        echo "{\"current_updates\": {\"count\": $NEW_COUNT}}"

    - name: echo_monitor
      type: monitor
      runtime: python
      interval: 2
      script: |
        import json, os
        current = json.load(open(os.environ["MYWANT_CURRENT_FILE"]))
        count = int(current.get("count", 0))
        limit = int(current.get("limit", 5))
        should_stop = count >= limit
        print(json.dumps({"should_stop": should_stop}))
