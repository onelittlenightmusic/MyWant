wantType:
  metadata:
    name: gui_state
    title: GUI Display State
    description: >
      Tracks the current web dashboard display state (active sidebar want,
      status filter, search query). Automatically created on server startup;
      state resets on restart. Used by `mywant gui show` to navigate the
      dashboard remotely.
    version: '1.0'
    category: system
    pattern: independent
    labels:
      system-internal: "true"

  parameters: []

  state:
    - name: source
      description: Who last updated the state ("cli" or "frontend")
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: dashboard_status_filter
      description: Active status filter on the dashboard (e.g. "reaching", "stopped", "")
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: dashboard_search_query
      description: Active search query on the dashboard
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: sidebar_open
      description: Whether the want details sidebar is open
      type: bool
      label: current
      persistent: false
      initialValue: false

    - name: sidebar_want_id
      description: ID of the want currently shown in the sidebar
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: sidebar_active_tab
      description: Active tab in the sidebar (settings|results|logs|agents|versions|chat)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: canvas_scale
      description: Zoom scale of the 2D canvas view (0.2–2.5)
      type: float64
      label: current
      persistent: false
      initialValue: 1.0

    - name: canvas_cursor_x
      description: X tile coordinate of the CursorMan on the 2D canvas (used for cross-tab cursor sync)
      type: float64
      label: current
      persistent: false
      initialValue: 0

    - name: canvas_cursor_y
      description: Y tile coordinate of the CursorMan on the 2D canvas (used for cross-tab cursor sync)
      type: float64
      label: current
      persistent: false
      initialValue: 0

    # ── Robot cursor fields ────────────────────────────────────────────────────
    # Used by mywant-gui robot overlay (driven by CLI commands like `mywant gui wants open`)

    - name: robot_visible
      description: Whether the robot cursor overlay is visible
      type: bool
      label: current
      persistent: false
      initialValue: false

    - name: robot_message
      description: Message shown in the robot speech bubble
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: robot_target_type
      description: >
        DOM target type for the robot cursor:
        "want_card" | "nav_wants" | "nav_agents" | "nav_types" | "nav_recipes" |
        "sidebar_tab" | "sidebar_close" | "param_field" | "none" | ""
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: robot_target_id
      description: Target identifier (want ID, param key, nav ID, etc.)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: robot_action
      description: Action to perform — "click" | "hover" | "type" | "navigate" | ""
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: robot_action_payload
      description: Payload for the "type" action (value to display being typed)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: robot_nonce
      description: >
        Monotonically increasing counter (unix ms); each CLI command increments
        this so the frontend can detect a new command even when the target is the same.
      type: int
      label: current
      persistent: false
      initialValue: 0

    - name: nav_route
      description: Client-side navigation route to push (e.g. "/agents", "/recipes")
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: sidebar_settings_subtab
      description: Active sub-tab within the settings panel (name|params|labels|schedule|deps|expose|import)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: expanded_want_id
      description: ID of the want card currently maximized/expanded to full-screen view. Empty string means no card is maximized.
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: float_card_corner
      description: Corner of the screen where the canvas float card is anchored ("top-left" | "top-right" | "bottom-left" | "bottom-right")
      type: string
      label: current
      persistent: false
      initialValue: "bottom-left"

    - name: canvas_center_x
      description: X canvas coordinate of the viewport center (used for cross-tab pan sync)
      type: float64
      label: current
      persistent: false
      initialValue: 0

    - name: canvas_center_y
      description: Y canvas coordinate of the viewport center (used for cross-tab pan sync)
      type: float64
      label: current
      persistent: false
      initialValue: 0

    # ── Add Want form control (driven by CLI) ─────────────────────────────────

    - name: add_form_open
      description: When true, the CLI has requested the Add Want form to open.
      type: bool
      label: current
      persistent: false
      initialValue: false

    - name: add_form_type
      description: Want type ID to pre-select in the Add Want form (e.g. "choice"). Empty = show type picker.
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: add_form_nonce
      description: Monotonically increasing counter. Each new value triggers the action encoded in add_form_open/add_form_type.
      type: int
      label: current
      persistent: false
      initialValue: 0

    - name: add_form_deploy_nonce
      description: Monotonically increasing counter. Each new value triggers form submission/deploy.
      type: int
      label: current
      persistent: false
      initialValue: 0

    - name: devices
      description: List of connected browser sessions (id, name, lastSeen).
      type: object
      label: current
      persistent: true

    - name: activeLocationDevice
      description: ID of the browser device currently sending location data.
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: locationWantId
      description: Want ID of the location want that receives geolocation updates.
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: pendingDeviceActions
      description: Queue of open-url actions pushed by agents for connected browser clients.
      type: object
      label: current
      persistent: false
