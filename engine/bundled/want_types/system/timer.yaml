wantType:
  metadata:
    name: timer
    title: Timer
    description: Controls a global scheduling parameter (WhenSpec). The user sets the interval (every) and optional time-of-day (at), which are propagated to the named global parameter so other wants can reference it via fromGlobalParam.
    version: '1.2'
    category: system
    pattern: independent
    labels:
      user-control: "true"
      type-icon: "Timer"
  parameters:
  - name: default_every
    description: Initial interval value if the global parameter is not yet set
    type: string
    required: false
    default: "5m"
  state:
  - name: every
    description: Scheduling interval input (e.g., 5m, 1h, 1 day). UI control — feeds into schedule.
    type: string
    label: internal
    persistent: true
  - name: at
    description: Optional time-of-day input (e.g., 09:00, 7am). UI control — feeds into schedule.
    type: string
    label: internal
    persistent: true
  - name: timer_mode
    description: Scheduling mode (every or at)
    type: string
    label: internal
    persistent: true
  - name: at_recurrence
    description: Recurrence for at-mode (day or week)
    type: string
    label: internal
    persistent: true
  - name: at_weekday
    description: Day of week for at-mode (e.g. mon, tue, …)
    type: string
    label: internal
    persistent: true
  - name: schedule
    description: Computed WhenSpec combining every and at. Expose this with asGlobalParam to propagate the schedule to a named global parameter.
    type: WhenSpec
    label: current
    persistent: true
    exposable: true
  - name: webhook_payload
    description: Payload received via POST /api/v1/webhooks/{id}; consumed by Progress()
    type: object
    label: current
  - name: webhook_received_at
    description: Timestamp of the last received webhook
    type: string
    label: current
  examples:
  - title: Global timer for periodic jobs
    description: Control the interval of wants that use fromGlobalParam
    want:
      metadata:
        name: job-interval-control
        type: timer
      spec:
        params:
          default_every: "5m"
        exposes:
          - currentState: schedule
            asGlobalParam: global_timer_1
