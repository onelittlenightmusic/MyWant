wantType:
  metadata:
    name: timer
    title: Timer Control
    description: Controls a global scheduling parameter (WhenSpec). The user sets the interval (every) and optional time-of-day (at), which are propagated to the named global parameter so other wants can reference it via fromGlobalParam.
    version: '1.0'
    category: system
    pattern: independent
    labels:
      user-control: "true"
  parameters:
  - name: target_param
    description: Name of the global parameter to control (e.g., global_timer_1)
    type: string
    required: true
    example: global_timer_1
  - name: default_every
    description: Initial interval value if the global parameter is not yet set
    type: string
    required: false
    default: "5m"
  state:
  - name: every
    description: Scheduling interval (e.g., 5m, 1h, 1 day)
    type: string
    label: current
    persistent: true
  - name: at
    description: Optional time-of-day expression (e.g., 09:00, 7am). Leave empty for interval-only scheduling.
    type: string
    label: current
    persistent: true
  - name: target_param
    description: Target global parameter name
    type: string
    label: current
    persistent: true
  examples:
  - title: Global timer for periodic jobs
    description: Control the interval of wants that use fromGlobalParam
    want:
      metadata:
        name: job-interval-control
        type: timer
      spec:
        params:
          target_param: global_timer_1
          default_every: "5m"
