wantType:
  metadata:
    name: choice
    title: Choice Selector
    description: Allows selecting a value from a list and propagating the selection to a parent goal state via exposes.
    version: '1.1'
    category: system
    pattern: independent
    labels:
      user-control: "true"
      type-icon: "ListFilter"
  parameters:
  - name: default
    description: Initial selected value
    type: string
    required: false
  - name: globalMemoCategory
    description: If set, choices are automatically populated from the memo category with this key (e.g. "cities"). The list is refreshed on every progress tick.
    type: string
    required: false
  state:
  - name: choices
    description: List of available choices. Populate via spec.imports (e.g. imports.my_global_key = choices).
    type: array
    label: current
    persistent: true
    initialValue: []
  - name: selected
    description: Currently selected value
    type: any
    label: current
    persistent: true
    exposable: true
  - name: webhook_payload
    description: Payload received via POST /api/v1/webhooks/{id}; consumed by Progress()
    type: object
    label: current
  - name: webhook_received_at
    description: Timestamp of the last received webhook
    type: string
    label: current
  examples:
  - title: SmartGolf slot selection
    description: Selects an available SmartGolf slot fetched by smartgolf_list_available, propagating the selection to parent's plan state.
    want:
      metadata:
        name: smartgolf-slot-choice
        type: choice
      spec:
        imports:
          smartgolf_all_available_times: choices
        exposes:
          - currentState: selected
            asPlan: selected_slot
