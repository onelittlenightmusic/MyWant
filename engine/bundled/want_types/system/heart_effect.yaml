wantType:
  metadata:
    name: heart_effect
    title: Heart Effect
    description: Triggers a heart effect on the web canvas when X button is pressed.
    version: '1.1'
    category: effect
    pattern: independent
    labels:
      riffable: reaction
      type-icon: Heart
  parameters:
    - name: input_button
      type: string
      default: "button-x"
      label: Trigger button
      description: "Button/key that triggers this want (e.g. button-x, y-button, menu-toggle)"
    - name: input_action
      type: string
      default: "trigger"
      label: Webhook action
      description: Webhook action name to dispatch on button press
    - name: input_condition
      type: string
      default: ""
      label: Trigger condition
      description: "empty-space = only when cursor is on empty canvas cell; leave blank for always"
  state:
    - name: heart_triggers
      description: Number of times the heart effect has been triggered
      type: integer
      label: current
      persistent: true
      exposable: true
    - name: webhook_payload
      description: Payload received via POST /api/v1/webhooks/{id}; consumed by Progress()
      type: object
      label: current
    - name: webhook_received_at
      description: Timestamp of the last received webhook
      type: string
      label: current
