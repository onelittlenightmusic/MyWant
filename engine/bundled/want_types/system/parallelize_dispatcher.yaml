wantType:
  metadata:
    name: parallelize_dispatcher
    title: Parallelize Dispatcher
    description: |
      Thinker want that reads a child_params list and dispatches sibling wants (one per entry)
      to the parent coordinator via ProposeDispatch.
      Used as the coordinator child inside a "parallelize" recipe.
    version: '1.0'
    category: system
    pattern: independent
    system_type: true
    labels:
      child-role: thinker

  parameters:
    - name: child_params
      description: |
        List of param objects for each dispatched sibling want.
        Example: [{target: hall-door-03}, {target: hall-door-04}]
      type: object
      required: true
    - name: child_type
      description: Want type for each dispatched sibling
      type: string
      required: true

  state:
    - name: child_params
      description: Child params list (copied from param)
      type: object
      persistent: false
      label: current
      initialValue: []
    - name: child_type
      description: Child want type (copied from param)
      type: string
      persistent: false
      label: current
      initialValue: ""
    - name: all_dispatched
      description: True after all dispatch requests have been proposed
      type: bool
      persistent: true
      label: current
      initialValue: false
    - name: dispatch_count
      description: Number of siblings dispatched
      type: int
      persistent: true
      label: current
      initialValue: 0
    - name: siblings_done
      description: True when all dispatched siblings have achieved
      type: bool
      persistent: true
      label: current
      initialValue: false

  finalizeWhen:
    achieved:
      field: siblings_done
      operator: "=="
      value: true

  requires:
    - parallelize_dispatch
