wantType:
  metadata:
    name: rpg_hook
    title: RPG Lifecycle Hook
    description: |
      Registers one or more filtered lifecycle webhook rules with the mywant server.
      Each rule in the `rules` array is registered independently.
      When a matching lifecycle event fires, mywant POSTs the event plus the rule's
      embedded metadata to the target URL.

      Deploying this want installs all rules; deleting it removes them automatically
      (similar to admission webhooks in Kubernetes).
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: hook_rule_ids

  onInitialize:
    params:
      hook_rules: rules
      hook_target_url: target_url
      mywant_url: mywant_url
    plan:
      hook_plan: "register"
    executeAgents: true

  onDelete:
    plan:
      hook_plan: "unregister"
    executeAgents: true

  parameters:
    - name: rules
      description: |
        JSON array of rule objects. Each object may have:
          event (required): "want_created" | "want_achieved"
          match_type: want type to match (e.g. "hotel", "reminder")
          match_owner: controller ownerReference name to match
          match_name: exact want name to match
          match_labels: map of label key/value pairs to match
          target_url: per-rule override for hook_target_url
          metadata: arbitrary key/value pairs forwarded to target URL
      type: string
      required: true

    - name: target_url
      description: Default HTTP endpoint to POST matching events to (can be overridden per rule)
      type: string
      required: false

    - name: mywant_url
      description: Base URL of the mywant server (used for in-process fallback HTTP)
      type: string
      required: false
      default: "http://localhost:8080"

  state:
    - name: hook_plan
      description: Lifecycle directive ("register" or "unregister")
      type: string
      persistent: false
      label: plan
      initialValue: ''

    - name: hook_rules
      description: JSON array of rule specs (populated from rules param)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: hook_target_url
      description: Default target URL for all rules
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: mywant_url
      description: mywant server base URL
      type: string
      persistent: false
      label: current
      initialValue: 'http://localhost:8080'

    - name: hook_rule_ids
      description: JSON array of registered rule IDs (one per rule spec)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: status
      description: Hook registration status (running / stopped / failed)
      type: string
      persistent: true
      label: current
      initialValue: 'pending'

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  requires:
    - lifecycle_hook_management

  agents:
    - name: lifecycle_hook_agent
      role: action
      description: Registers or unregisters filtered lifecycle webhook rules with the mywant server.

  examples:
    - name: workshop1-hooks
      description: Register all lifecycle hooks for workshop1 Family Rescue scenario
      want:
        metadata:
          name: workshop1-hooks
          type: rpg_hook
        spec:
          params:
            target_url: "http://localhost:7100/api/v1/hooks/mywant"
            rules: |
              [
                {"event":"want_created","match_type":"reminder","match_owner":"wife-target",
                 "metadata":{"activate":"wife_remind_created","skip_if_achievement":"wife_remind_created"}},
                {"event":"want_achieved","match_type":"reminder","match_owner":"wife-target",
                 "metadata":{"activate":"wife_target","skip_if_achievement":"wife_rescued"}}
              ]
      expectedBehavior: |
        When deployed, registers 2 lifecycle rules. When deleted, both are unregistered.
