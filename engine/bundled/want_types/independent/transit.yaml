wantType:
  metadata:
    name: transit
    title: Transit Route Found
    description: |
      Looks up the optimal transit route for a given origin, destination, and
      target arrival time using OpenTripPlanner (OTP 2.x GraphQL API).

      Origin and destination are geocoded via Nominatim (OpenStreetMap).
      Recommends the latest possible departure time to arrive on schedule.
      Runs only on configured days (default: weekdays). Re-queries daily.
    version: '1.0'
    category: commute
    pattern: independent
  finalResultField: recommended_departure

  parameters:
    - name: origin
      description: Departure location (station name or address)
      type: string
      required: true
      example: 渋谷駅

    - name: destination
      description: Arrival location (station name or address)
      type: string
      required: true
      example: 新宿駅

    - name: arrive_by
      description: Target arrival time in HH:MM format (local time)
      type: string
      default: "09:00"
      required: false
      example: "09:00"

    - name: days
      description: Comma-separated weekday codes to run on (mon,tue,wed,thu,fri,sat,sun). Default is weekdays.
      type: string
      default: "mon,tue,wed,thu,fri"
      required: false
      example: "mon,tue,wed,thu,fri"

    - name: name
      description: Human-readable label for this route (used in briefing output)
      type: string
      required: false
      example: オフィス

    - name: otp_url
      description: OpenTripPlanner server base URL (e.g. http://localhost:8082). Falls back to OTP_URL env var.
      type: string
      required: false
      default: "http://localhost:8082"
      defaultGlobalParameter: otp_url


  state:
    - name: origin
      description: Departure location (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: destination
      description: Arrival location (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: arrive_by
      description: Target arrival time HH:MM (copied from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: otp_url
      description: OpenTripPlanner server base URL (promoted from param by Initialize)
      type: string
      persistent: false
      label: current
      initialValue: ''

    - name: transit_status
      description: Current status (pending, querying, done, failed)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: recommended_departure
      description: Recommended departure time (e.g. "8:31")
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: estimated_arrival
      description: Expected arrival time (e.g. "9:00")
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: duration_minutes
      description: Total travel duration in minutes
      type: int
      persistent: true
      label: current
      initialValue: 0

    - name: first_vehicle
      description: First transit line/vehicle name (e.g. "山手線")
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: boarding_stop
      description: First boarding station name
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: transfers
      description: Number of transfers required
      type: int
      persistent: true
      label: current
      initialValue: 0

    - name: route_name
      description: Human-readable route label
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: transit_result
      description: Full JSON result of the transit query
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: queried_at
      description: Timestamp of when the last query was executed (RFC3339)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: error
      description: Error message if query failed
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: transit_text
      description: Formatted one-line summary of the transit result (for sibling coordinator Wants)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: transit_date
      description: Date when transit_text was last computed (YYYY-MM-DD)
      type: string
      persistent: true
      label: current
      initialValue: ''

    - name: retry_count
      description: Number of times the transit query has been retried after failure
      type: int
      persistent: true
      label: current
      initialValue: 0

    - name: achieving_percentage
      description: Progress percentage
      type: int
      persistent: true
      label: current
      initialValue: 0

  agents:
    - name: agent_transit_api
      role: action
      description: Queries OpenTripPlanner 2.x GraphQL API for transit route recommendations

  requires:
    - transit_api_agency

  examples:
    - name: Daily Office Commute (OTP)
      description: Look up optimal departure time for weekday commute using local OTP server
      want:
        metadata:
          name: office-commute
          type: transit
        spec:
          params:
            name: オフィス
            origin: 渋谷駅
            destination: 新宿駅
            arrive_by: "09:00"
            days: "mon,tue,wed,thu,fri,sat,sun"
            otp_url: "http://localhost:8082"

    - name: Tokyo to Shinjuku
      description: Single-trip route lookup from Tokyo Station to Shinjuku
      want:
        metadata:
          name: tokyo-shinjuku
          type: transit
        spec:
          params:
            name: 東京→新宿
            origin: 東京駅
            destination: 新宿駅
            arrive_by: "10:00"
            days: "mon,tue,wed,thu,fri,sat,sun"
            otp_url: "http://localhost:8082"
