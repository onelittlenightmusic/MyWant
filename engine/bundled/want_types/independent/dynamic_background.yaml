wantType:
  metadata:
    name: dynamic_background
    title: Dynamic Background
    description: |
      Monitors a want's state field for an image URL (via spec.imports) and applies it
      as the canvas and dashboard background (canvas_bg_url in server config).

      Usage:
        spec:
          imports:
            spotify_album_art_url: source_image_url   # key = expose field on source want
    version: '1.1'
    category: ui
    pattern: independent
    labels:
      type-icon: "Image"

  finalResultField: current_image_url

  state:
    - name: source_image_url
      description: Live image URL imported from a source want via spec.imports
      type: string
      subType: image
      label: current
      persistent: false
      initialValue: ""

    - name: current_image_url
      description: URL of the currently applied background image
      type: string
      subType: image_url
      label: current
      persistent: true
      initialValue: ""

    - name: status
      description: Current status message
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: last_error
      description: Last error message
      type: string
      label: current
      persistent: false
      initialValue: ""

  agents:
    - name: dynamic_background_agent
      role: monitor
      description: Watches source_image_url (imported via spec.imports) and applies it as canvas/dashboard background

  requires:
    - dynamic_background_agency

  examples:
    - name: Spotify Album Art Background
      description: Apply Spotify album art as the app background
      want:
        metadata:
          name: my-background
          type: dynamic_background
        spec:
          imports:
            album_art_url: source_image_url
