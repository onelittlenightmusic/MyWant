wantType:
  metadata:
    name: web_inspector
    title: Web Inspector
    description: |
      Opens the target URL with an interactive overlay via the MyWant Web
      Inspector Chrome extension (mcp/playwright-app/chrome-extension/) — its
      background service worker polls for this want and opens/injects the tab
      itself, no CDP-debuggable Chrome required. Use arrow keys or a gamepad
      to navigate between interactive elements (inputs, buttons, links).
      Press Enter (or A button) to select an element and name it. Click
      "完了" when finished — the selected element list is sent back to
      MyWant and can be saved as a reusable web want type.
    version: '1.0'
    category: web
    pattern: independent
    labels:
      category-icon: "Globe"
      category-bg-light: "linear-gradient(160deg, #bfdbfe 0%, #ddd6fe 100%)"
      category-bg-dark:  "linear-gradient(160deg, #1e3a5f 0%, #2d1b69 100%)"

  parameters:
    - name: target_url
      description: URL to open in the inspector tab
      type: string
      required: true
      example: "https://example.com"

    - name: mywant_api_port
      description: Port that the MyWant API server is listening on (for the done webhook)
      type: string
      required: false
      default: "8080"

    - name: characterId
      description: ID of the character marking elements this session (color resolved server-side for attribution)
      type: string
      required: false
      default: ""

    - name: wantTypeName
      description: Existing web want type name to reopen (review mode) — its saved elements.json is shown via the nav CursorMan
      type: string
      required: false
      default: ""

  state:
    - name: target_url
      description: URL being inspected
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: mywant_api_port
      description: MyWant API port (mirrored from param)
      type: string
      label: current
      persistent: false
      initialValue: "8080"

    - name: characterId
      description: Acting character ID (mirrored from param)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: wantTypeName
      description: Existing web want type name being reopened, if any (mirrored from param)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: doneWebhookId
      description: Webhook ID the overlay posts to when the user clicks Done
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: auto_launch_claimed
      description: >-
        True once the Chrome extension's background poll has claimed this
        want to open a tab for — prevents a second poll tick from opening a
        duplicate tab for the same want.
      type: bool
      label: current
      persistent: true
      initialValue: false

    - name: screenshot_url
      description: URL of the completion snapshot (/api/v1/screenshots/...), captured just before the tab closes
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: inspector_error
      description: Error message if opening the inspector failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: inspection_complete
      description: True once the user has finished selecting elements
      type: bool
      label: current
      persistent: true
      initialValue: false

    - name: selected_elements
      description: JSON object mapping hostname to selected element array
      type: object
      label: current
      persistent: true
      initialValue: {}

    - name: action_by_agent
      description: Name of the agent that last updated state
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: inspection_done_received
      description: Signal set by webhook when user clicks Done (consumed by agent)
      type: bool
      label: current
      persistent: false
      initialValue: false

  requires:
    - web_inspection

  finalizeWhen:
    achieved:
      field: inspection_complete
      operator: "=="
      value: true

  finalResultField: selected_elements

  examples:
    - name: Inspect Google search page
      description: Select the search box and search button on Google
      want:
        metadata:
          name: inspect_google
          type: web_inspector
        spec:
          params:
            target_url: "https://www.google.com"
