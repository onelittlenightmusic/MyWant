recipe:
  metadata:
    name: "Budget Slider Control"
    description: "Travel budget system with interactive slider to dynamically adjust the budget limit in real-time"
    custom_type: "budget slider control"
    category: "travel"
    version: "1.0.0"

  parameters:
    - name: prefix
      description: "Prefix used for naming wants in the generated deployment"
      type: string
      default: "budget-ctrl"
      required: false
    - name: initial_budget
      description: "Initial budget amount (also controls slider default position)"
      type: float64
      default: 5000.0
      required: false
      validation:
        min: 100
        max: 50000
    - name: currency
      description: "Currency code for budget tracking (USD, EUR, JPY)"
      type: string
      default: USD
      required: false
    - name: restaurant_type
      description: "Type of restaurant to book"
      type: string
      default: "fine dining"
      required: false
    - name: hotel_type
      description: "Type of hotel accommodation"
      type: string
      default: "luxury"
      required: false
    - name: restaurant_cost
      description: "Estimated restaurant cost"
      type: float64
      default: 300.0
      required: false
      validation:
        min: 50
        max: 5000
    - name: hotel_cost
      description: "Estimated hotel cost"
      type: float64
      default: 800.0
      required: false
      validation:
        min: 100
        max: 10000
    - name: budget_min
      description: "Minimum value for the budget slider"
      type: float64
      default: 1000.0
      required: false
      validation:
        min: 100
        max: 10000
    - name: budget_max
      description: "Maximum value for the budget slider"
      type: float64
      default: 20000.0
      required: false
      validation:
        min: 1000
        max: 100000
    - name: budget_step
      description: "Step increment for the budget slider"
      type: float64
      default: 500.0
      required: false
      validation:
        min: 100
        max: 5000

  wants:
    # Slider control — user drags this to change the budget limit in real-time.
    # target_param: "budget" is a literal string (not a recipe param reference),
    # so it is NOT substituted. slider.Progress() calls PropagateParameter("budget", value)
    # → coordinator.UpdateParameter("budget", value).
    - metadata:
        type: slider
        labels:
          role: control
          user-control: "true"
      spec:
        params:
          target_param: "budget"
          default: initial_budget
          min: budget_min
          max: budget_max
          step: budget_step

    # Budget tracker — subscribes to coordinator's "budget" param via exposes.
    # When the slider updates coordinator.budget, the paramExposeHandler fires and
    # calls budget.UpdateParameter("budget", newValue), so BudgetThinker picks up
    # the new limit on its next tick.
    - metadata:
        type: budget
        labels:
          role: tracker
          category: finance
      spec:
        params:
          budget: initial_budget
          currency: currency
        exposes:
          - param: budget
            as: budget

    # Restaurant reservation with cost reporting
    - metadata:
        type: restaurant
        labels:
          role: scheduler
          category: dining
      spec:
        params:
          restaurant_type: restaurant_type
          cost: restaurant_cost

    # Hotel reservation with cost reporting
    - metadata:
        type: hotel
        labels:
          role: scheduler
          category: accommodation
      spec:
        params:
          hotel_type: hotel_type
          cost: hotel_cost

  state:
    - name: costs
      description: "Map of child want names to their reported costs"
      type: map
      label: current
    - name: itinerary
      description: "Map of child want names to their itinerary entries (written by condition_thinker)"
      type: map
      label: current
    - name: wants
      description: "Map of child want names to their final_result values (written on achievement)"
      type: map
      label: current
    - name: target_budgets
      description: "Per-want target budgets computed by budget_thinker"
      type: map
      label: plan
    - name: _child_updated
      description: "Name of the most recently updated child want"
      type: string
      label: current
    - name: total_cost
      description: "Total aggregated cost"
      type: float64
      label: current
    - name: remaining_budget
      description: "Budget minus total cost"
      type: float64
      label: current
    - name: budget_budget_summary
      description: "Budget tracking summary from budget want"
      type: string
      label: current
    - name: restaurant_final_result
      description: "Restaurant reservation result"
      type: string
      label: current
    - name: hotel_final_result
      description: "Hotel booking result"
      type: string
      label: current

  finalResultField: budget_budget_summary

  result:
    - want_name: "budget"
      state_field: "budget_summary"
      description: "Budget tracking summary"
    - want_name: "restaurant"
      state_field: "final_result"
      description: "Restaurant reservation result"
    - want_name: "hotel"
      state_field: "final_result"
      description: "Hotel booking result"
