recipe:
  # Recipe metadata - defines this as a custom target type
  metadata:
    name: "Prime Sieve"
    description: "Prime number generation and filtering pipeline"
    custom_type: "prime sieve"
    category: "mathematics"
    version: "1.0.0"

  # Recipe parameters - these are the configurable values
  parameters:
    - name: prefix
      description: "Prefix used for naming wants in the generated deployment"
      type: string
      default: "prime"
      required: false
    - name: display_name
      description: "Display name for the recipe instance"
      type: string
      default: "Prime Number Sieve"
      required: false
    - name: start_number
      description: "Starting number for the range to search for primes"
      type: int
      default: 2
      required: false
      validation:
        min: 2
        max: 1000
    - name: end_number
      description: "Ending number for the range to search for primes"
      type: int
      default: 100
      required: false
      validation:
        min: 2
        max: 10000

  wants:
    # Prime number generator - generates consecutive numbers
    - metadata:
        type: prime numbers
        labels:
          role: generator
          component: source
      spec:
        params:
          start: start_number
          end: end_number

    # Prime sequence - filters out non-prime numbers using sieve algorithm
    - metadata:
        type: prime sequence
        labels:
          role: filter
          component: processor
      spec:
        params: {}
        using:
          - role: generator

  finalResultField: "prime sequence_foundPrimes"

  # Recipe result definition - specifies how to compute prime sieve results
  result:
    - want_name: "prime sequence"
      state_field: "foundPrimes"
      description: "List of prime numbers found"
    - want_name: "prime sequence"
      state_field: "primeCount"
      description: "Count of prime numbers found"
  # Example deployment - one-click deployment configuration
  example:
    wants:
      - metadata:
          name: "prime-sieve-demo"
          type: "prime sieve"
          labels:
            recipe: "Prime Sieve"
        spec:
          params: {}
