recipe:
  metadata:
    name: "Flight With Budget"
    description: "Flight booking with budget tracking - aggregates flight costs against a budget limit"
    custom_type: "flight with budget system"
    category: "travel"
    version: "1.0.0"

  parameters:
    - name: prefix
      description: "Prefix used for naming wants in the generated deployment"
      type: string
      default: "flight-budget"
      required: false
    - name: budget
      description: "Total budget amount"
      type: float64
      default: 3000.0
      required: false
      validation:
        min: 500
        max: 20000
    - name: currency
      description: "Currency code for budget tracking"
      type: string
      default: USD
      required: false
    - name: flight_type
      description: "Flight class (economy, business, first)"
      type: string
      default: "economy"
      required: false
    - name: duration_hours
      description: "Estimated flight duration in hours"
      type: float64
      default: 10.0
      required: false
      validation:
        min: 1.0
        max: 24.0
    - name: departure_date
      description: "Departure date in YYYY-MM-DD format"
      type: string
      default: "2025-12-25"
      required: false
    - name: flight_cost
      description: "Estimated flight cost for budget tracking (if no agent)"
      type: float64
      default: 1200.0
      required: false
      validation:
        min: 100
        max: 10000
    - name: server_url
      description: "Mock flight server URL"
      type: string
      default: "http://localhost:8090"
      required: false

  wants:
    # Budget tracker - aggregates costs from child wants
    - metadata:
        type: budget
        labels:
          role: tracker
          category: finance
      spec:
        params:
          budget: budget
          currency: currency

    # Flight reservation with cost reporting
    - metadata:
        type: flight
        labels:
          role: scheduler
          category: travel
      spec:
        params:
          flight_type: flight_type
          duration_hours: duration_hours
          departure_date: departure_date
          cost: flight_cost
          server_url: server_url
        requires:
          - flight_api_agency

  state:
    - name: costs
      description: "Map of child want names to their reported costs"
      type: map
      label: current
    - name: itinerary
      description: "Map of child want names to their itinerary entries (written by condition_thinker)"
      type: map
      label: current
    - name: wants
      description: "Map of child want names to their final_result values (written on achievement)"
      type: map
      label: current
    - name: target_budgets
      description: "Per-want target budgets computed by budget_thinker"
      type: map
      label: plan
    - name: _child_updated
      description: "Name of the most recently updated child want"
      type: string
      label: current
    - name: total_cost
      description: "Total aggregated cost"
      type: float64
      label: current
    - name: remaining_budget
      description: "Budget minus total cost"
      type: float64
      label: current
    - name: budget_budget_summary
      description: "Budget tracking summary from budget want"
      type: string
      label: current
    - name: flight_final_result
      description: "Flight booking result"
      type: string
      label: current

  finalResultField: budget_budget_summary

  result:
    - want_name: "budget"
      state_field: "budget_summary"
      description: "Budget tracking summary"
    - want_name: "flight"
      state_field: "reservation_name"
      description: "Flight booking result"
