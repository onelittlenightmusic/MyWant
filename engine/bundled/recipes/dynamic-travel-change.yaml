recipe:
  # Recipe metadata - defines this as a custom target type with agent integration
  metadata:
    name: "Dynamic Travel Change with Flight API"
    description: "Travel planning with API-based flight booking, automatic monitoring, and delay-triggered rebooking"
    custom_type: "dynamic travel change"
    category: "travel"
    version: "2.0.0"

  # Recipe parameters - these are the configurable values
  parameters:
    - name: prefix
      description: "Prefix used for naming wants in the generated deployment"
      type: string
      default: "travel"
      required: false
    - name: display_name
      description: "Display name for the dynamic travel itinerary"
      type: string
      default: "Dynamic Travel Itinerary with Flight Monitoring"
      required: false
    - name: server_url
      description: "URL of the flight API server for booking"
      type: string
      default: "http://localhost:8090"
      required: false
    - name: flight_number
      description: "Flight number to book"
      type: string
      default: "AA100"
      required: false
    - name: flight_type
      description: "Class of service (e.g., business class, economy)"
      type: string
      default: "business class"
      required: false
    - name: from
      description: "Departure city"
      type: string
      default: "New York"
      required: false
    - name: to
      description: "Destination city"
      type: string
      default: "Los Angeles"
      required: false
    - name: departure_date
      description: "Flight departure date in YYYY-MM-DD format"
      type: string
      default: "2026-12-20"
      required: false
    - name: restaurant_type
      description: "Type of restaurant to book"
      type: string
      default: "fine dining"
      required: false
    - name: hotel_type
      description: "Type of hotel accommodation"
      type: string
      default: "luxury"
      required: false
    - name: buffet_type
      description: "Type of buffet for breakfast"
      type: string
      default: "international"
      required: false
    - name: dinner_duration
      description: "Expected duration of dinner in hours"
      type: float64
      default: 2.0
      required: false
      validation:
        min: 0.5
        max: 6.0
    - name: flight_duration
      description: "Expected duration of flight in hours"
      type: float64
      default: 12.0
      required: false
      validation:
        min: 1.0
        max: 24.0

  wants:
    # Flight booking with API agent - monitors and auto-reboks on delay
    - metadata:
        type: flight
        labels:
          role: scheduler
          category: flight-api
      spec:
        params:
          server_url: server_url
          flight_number: flight_number
          flight_type: flight_type
          from: from
          to: to
          departure_date: departure_date
          duration_hours: flight_duration
          completion_timeout: 120
        requires:
          - create_flight

    # Dinner restaurant reservation with agent processing
    - metadata:
        type: restaurant
        labels:
          role: scheduler
      spec:
        params:
          restaurant_type: restaurant_type
          duration_hours: dinner_duration

    # Hotel accommodation booking with agent processing
    - metadata:
        type: hotel
        labels:
          role: scheduler
      spec:
        params:
          hotel_type: hotel_type

    # Morning breakfast buffet with agent processing
    - metadata:
        type: buffet
        labels:
          role: scheduler
      spec:
        params:
          buffet_type: buffet_type

  finalResultField: flight_final_result

  # Recipe result definition - specifies how to compute travel planning results
  result:
    - want_name: "flight"
      state_field: "final_result"
      description: "Flight booking result"
    - want_name: "restaurant"
      state_field: "final_result"
      description: "Restaurant reservation result"
    - want_name: "hotel"
      state_field: "final_result"
      description: "Hotel booking result"
    - want_name: "buffet"
      state_field: "final_result"
      description: "Buffet reservation result"
  # Example deployment - one-click deployment configuration
  example:
    wants:
      - metadata:
          name: "dynamic-travel-change-demo"
          type: "dynamic travel change"
          labels:
            recipe: "Dynamic Travel Change with Flight API"
        spec:
          params: {}
