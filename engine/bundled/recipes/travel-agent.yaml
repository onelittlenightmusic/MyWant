recipe:
  # Recipe metadata - defines this as a custom target type with full agent integration
  metadata:
    name: "Travel Agent System"
    description: "Complete travel planning system with agent integration for all components"
    custom_type: "agent travel system"
    category: "travel"
    version: "2.0.0"

  # Recipe parameters - these are the configurable values
  parameters:
    - name: prefix
      description: "Prefix used for naming wants in the generated deployment"
      type: string
      default: "travel"
      required: false
    - name: display_name
      description: "Display name for the travel system"
      type: string
      default: "Full Agent-Enabled Travel System"
      required: false
    - name: restaurant_type
      description: "Type of restaurant to book with agent support"
      type: string
      default: "fine dining"
      required: false
    - name: hotel_type
      description: "Type of hotel accommodation with agent support"
      type: string
      default: "luxury"
      required: false
    - name: buffet_type
      description: "Type of buffet for breakfast with agent support"
      type: string
      default: "international"
      required: false
    - name: dinner_duration
      description: "Expected duration of dinner in hours"
      type: float64
      default: 2.0
      required: false
      validation:
        min: 0.5
        max: 6.0
    - name: state_history_skip_count
      description: "Number of state history entries to skip for performance"
      type: int
      default: 1
      required: false
      validation:
        min: 0
        max: 10

  wants:
    # Dinner restaurant reservation with agent support
    - metadata:
        type: restaurant
        labels:
          child-role: doer
          category: dining
      spec:
        params:
          restaurant_type: restaurant_type
          duration_hours: dinner_duration
          state_history_skip_count: state_history_skip_count

    # Hotel accommodation booking with agent support
    - metadata:
        type: hotel
        labels:
          child-role: doer
          category: accommodation
      spec:
        params:
          hotel_type: hotel_type

    # Morning breakfast buffet with agent support
    - metadata:
        type: buffet
        labels:
          child-role: doer
          category: dining
      spec:
        params:
          buffet_type: buffet_type

  finalResultField: restaurant_final_result

  # Recipe result definition - specifies how to compute travel planning results
  result:
    - want_name: "restaurant"
      state_field: "final_result"
      description: "Restaurant reservation result"
    - want_name: "hotel"
      state_field: "final_result"
      description: "Hotel booking result"
    - want_name: "buffet"
      state_field: "final_result"
      description: "Buffet reservation result"
  # Example deployment - one-click deployment configuration
  example:
    wants:
      - metadata:
          name: "travel-agent-demo"
          type: "agent travel system"
          labels:
            recipe: "Travel Agent System"
        spec:
          params: {}
