name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: true

    - name: Tidy dependencies
      run: |
        cd engine
        go mod tidy
        cd ../client
        go mod tidy

    - name: Verify OpenAPI Spec
      run: |
        if [ ! -f engine/openapi.yaml ]; then
          echo "engine/openapi.yaml is missing"
          exit 1
        fi

    - name: Create dummy frontend assets
      run: |
        mkdir -p web/dist
        touch web/dist/index.html

    - name: Run Engine Tests
      run: |
        cd engine
        go test -v ./...

    - name: Run Client Tests
      run: |
        cd client
        go test -v ./...

  build-chrome-extension:
    name: Build Web Inspector Chrome Extension
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mcp/playwright-app/package-lock.json

    - name: Install dependencies
      run: cd mcp/playwright-app && npm ci

    - name: Build (tsc + standalone overlay + chrome extension)
      run: cd mcp/playwright-app && npm run build

    - name: Verify chrome-extension build output
      run: |
        for f in manifest.json background.js content.js options.html options.js; do
          test -s "mcp/playwright-app/dist/chrome-extension/$f" || { echo "missing or empty: $f"; exit 1; }
        done
