receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  # Traces → Tempo
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logs → Loki (via native OTLP endpoint, available since Loki 2.9+)
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Debug output to collector stdout (useful when troubleshooting)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki]
