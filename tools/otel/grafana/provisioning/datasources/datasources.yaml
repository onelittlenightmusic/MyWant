apiVersion: 1

datasources:
  # Tempo (traces)
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  # Loki (logs)
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        # Extract trace ID from OTLP log records and link to Tempo
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo
