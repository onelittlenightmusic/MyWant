services:
  otp-server:
    image: docker.io/opentripplanner/opentripplanner:2.6.0
    container_name: ${OTP_CONTAINER_NAME:-mywant-otp-server}
    ports:
      - "${OTP_SERVER_PORT:-8080}:8080"
    volumes:
      - "${OTP_DATA_DIR:-/tmp/otp-data}:/var/opentripplanner"
    environment:
      JAVA_OPTIONS: "${OTP_SERVER_MEMORY:--Xmx4G}"
    command: ["--load", "--serve"]
